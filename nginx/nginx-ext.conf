load_module modules/ngx_http_geoip2_module.so;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}

http {
    geoip2 /etc/nginx/conf.d/GeoLite2-Country.mmdb {
        $geoip2_data_country_code country iso_code;
    }
    
    map $geoip2_data_country_code $allowed_country {
        default 0;
        AU 1;
        NZ 1;
        TW 1;
        JP 1;
        # KR 1;
        # CN 1;
    }

    include       /etc/nginx/mime.types;
    include       /etc/nginx/sites/upstream.conf;
    include       /etc/nginx/sites/external.conf;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    server_tokens   off;

    http2 on;
    # http3 on;
    # quic_retry on;
    keepalive_timeout  65;

    ssl_certificate /etc/letsencrypt/live/smileyfam.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smileyfam.me/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # https://ssl-config.mozilla.org/#server=nginx
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    
    # The "ssl_stapling" and "ssl_stapling_verify" directives enable OCSP (Online Certificate Status Protocol) stapling,
    # which is a method of checking the revocation status of SSL certificates without the need for a separate request to
    # the certificate authority. This helps to improve performance by reducing the number of requests that need to be made.
    # ssl_stapling on;
    # ssl_stapling_verify on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=15552001; includeSubdomains; preload";
}
