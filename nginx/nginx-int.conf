worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    include       /etc/nginx/conf.d/upstream.conf;
    include       /etc/nginx/sites/internal.conf;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    server_tokens   off;

    http2 on;
    # http3 on;
    # quic_retry on;
    keepalive_timeout  65;

    ssl_certificate /etc/keystore/server.crt;
    ssl_certificate_key /etc/keystore/server.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # https://ssl-config.mozilla.org/#server=nginx
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    
    # The "ssl_stapling" and "ssl_stapling_verify" directives enable OCSP (Online Certificate Status Protocol) stapling,
    # which is a method of checking the revocation status of SSL certificates without the need for a separate request to
    # the certificate authority. This helps to improve performance by reducing the number of requests that need to be made.
    # ssl_stapling on;
    # ssl_stapling_verify on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=15552001; includeSubdomains; preload";
}
