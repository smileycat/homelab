name: immich

volumes:
  immich-redis:
    name: immich-redis
  immich-model-cache:
    name: immich-model-cache

networks:
  immich_network:
    name: immich

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-server
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/hardware-transcoding
    #   file: hwaccel.transcoding.yml 
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    networks:
      - immich_network
    volumes:
      - /mnt/data/docker-volume/immich:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ${DOCKER_ENV}/immich/.env
    depends_on:
      - redis
      - database
    restart: unless-stopped
    ports:
      - 127.0.0.1:2283:2283
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich-machine-learning
    networks:
      - immich_network
    volumes:
      - immich-model-cache:/cache
    env_file:
      - ${DOCKER_ENV}/immich/.env
    restart: unless-stopped
    healthcheck:
      disable: false

  redis:
    image: redis:6.2-alpine@sha256:eaba718fecd1196d88533de7ba49bf903ad33664a92debb24660a922ecd9cac8
    container_name: immich-redis
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - immich_network
    volumes:
      - immich-redis:/data
    restart: unless-stopped

  database:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    container_name: immich-postgres
    networks:
      - immich_network
      - pgadmin
    env_file:
      - ${DOCKER_ENV}/immich/.env.database
    environment:
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DOCKER_VOL}/immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1;
        Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align
        --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')";
        echo "checksum failure count is $$Chksum";
        [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 10s
      start_period: 5m
    command: >-
      postgres
      -c shared_preload_libraries=vectors.so
      -c 'search_path="$$user", public, vectors'
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=512MB
      -c wal_compression=on
    restart: unless-stopped
