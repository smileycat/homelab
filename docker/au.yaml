include:
  - misc/essentials.yaml
  - misc/pgadmin.yaml
  # - immich/compose.yaml
  - misc/photoprism.yaml
  - misc/jellyfin.yaml
  - misc/vaultwarden.yaml
  - misc/navidrome.yaml

networks:
  pi_wg_network:
    name: pi_wg
    ipam:
      config:
        - subnet: 10.8.1.0/24

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    profiles: ["low"]
    volumes:
      - ${DOCKER_VOL}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
      - ${DOCKER_VOL}/pihole/etc-pihole:/etc/pihole
    networks:
      pi_wg_network:
        ipv4_address: 10.8.1.2
    ports:
      - 127.0.0.1:6600:80
      - 53:53/udp
      - 53:53/tcp
      # - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
    environment:
      - TZ='Australia/Melbourne'
    dns:
      - 127.0.0.1

  nginx-internal:
    image: nginx:1.27
    container_name: nginx-internal
    network_mode: host
    restart: unless-stopped
    command: sh -c 'mkdir -p /etc/nginx/sites && exec /docker-entrypoint.sh nginx -g "daemon off;"'
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/sites
      - HOSTNAME=smileyfam.au
    volumes:
      - ${HOME}/homelab/nginx/nginx-int.conf:/etc/nginx/nginx.conf:ro
      - ${HOME}/homelab/nginx/templates:/etc/nginx/templates:ro
      - ${HOME}/homelab/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${HOME}/keystore:/etc/keystore:ro
      - /etc/letsencrypt/live:/etc/letsencrypt/live:ro
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro
  
  nginx:
    build:
      context: ./dockerfiles
      dockerfile: nginx
    container_name: nginx-external
    hostname: nginx-external
    network_mode: host
    restart: unless-stopped
    command: sh -c 'mkdir -p /etc/nginx/sites && exec /docker-entrypoint.sh nginx -g "daemon off;"'
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/sites
      - HOSTNAME=smileyfam.au
    volumes:
      - ${HOME}/homelab/nginx/nginx-ext.conf:/etc/nginx/nginx.conf:ro
      - ${HOME}/homelab/nginx/templates:/etc/nginx/templates:ro
      - ${HOME}/homelab/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt/live:/etc/letsencrypt/live:ro
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wg-easy
    profiles: ["low"]
    networks:
      pi_wg_network:
        ipv4_address: 10.8.1.3
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    env_file:
      - ${DOCKER_ENV}/wg-easy/.env
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    volumes:
      - ${DOCKER_VOL}/wg-easy:/etc/wireguard
    ports:
      - 51820:51820/udp
      - 127.0.0.1:6602:51821/tcp
    restart: unless-stopped